<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>VEROSKURO</title>
    <link rel="alternate" type="application/rss+xml" title="Deductions RSS Feed" href="/rss.xml" />
    <meta name="description" content="Research notes on mechanistic interpretability, sentiment circuits, and the anatomy of deduction." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    
    <!-- Open Graph (for X, LinkedIn, Slack previews) -->
    <meta property="og:title" content="VEROSKURO" />
    <meta property="og:description" content="Research notes on mechanistic interpretability, sentiment circuits, and the anatomy of deduction." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://veroskuro.com" />
    
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
