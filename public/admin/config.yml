backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "public/uploads" # Media files will be stored in the repo under public/uploads
public_folder: "/uploads" # The src attribute for uploaded media will begin with /uploads

collections:
  - name: "deductions"
    label: "Deductions (Blog)"
    folder: "src/content/deductions"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Cover Image", name: "cover", widget: "image", required: false}
      - {label: "Case ID", name: "case_id", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
      
  - name: "lab_notes"
    label: "Lab Notes (Logs)"
    folder: "src/content/lab-notes"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Status", name: "status", widget: "select", options: ["ACTIVE", "PENDING", "COLD"]}
      - {label: "File Reference", name: "reference", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Image", name: "image", widget: "image", required: false}
      
  - name: "investigations"
    label: "Investigations (Projects)"
    folder: "src/content/investigations"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Case ID", name: "case_id", widget: "string"}
      - {label: "Last Modified", name: "date", widget: "datetime"}
      - {label: "Hero Image", name: "hero_image", widget: "image"}
      - {label: "Summary / Metadata", name: "summary", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "artifacts"
    label: "Artifacts (Tools & Visuals)"
    folder: "src/content/artifacts"
    create: true
    format: "json"
    extension: "json"
    slug: "{{id}}"
    identifier_field: "id"
    fields:
      - {label: "Artifact ID", name: "id", widget: "string"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Metadata String", name: "metadata", widget: "string"}
      - {label: "Grid Span Size", name: "spanType", widget: "select", options: ["short", "normal", "tall"]}

  - name: "globals"
    label: "Global Site Settings"
    editor:
      preview: false
    files:
      - label: "Detective Profile"
        name: "profile"
        file: "src/content/data/profile.json"
        format: "json"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "Quote", name: "quote", widget: "text"}
          - label: "Bio Paragraphs"
            name: "bioParagraphs"
            widget: "list"
            field: {label: "Paragraph", name: "paragraph", widget: "text"}
          - label: "Current Investigation"
            name: "currentInvestigation"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "Previous Evidence"
            name: "previousEvidence"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "Docket CV"
            name: "docketCv"
            widget: "object"
            fields:
              - {label: "Researcher ID", name: "researcherId", widget: "string"}
              - {label: "Status", name: "status", widget: "string"}
              - {label: "Location", name: "location", widget: "string"}
              - {label: "Specialty", name: "specialty", widget: "string"}
              - {label: "Experience", name: "experience", widget: "string"}
          - label: "Field Skills"
            name: "fieldSkills"
            widget: "list"
            field: {label: "Skill", name: "skill", widget: "string"}
          - label: "Academic Record"
            name: "academicRecord"
            widget: "list"
            fields:
              - {label: "Degree / Detail", name: "degree", widget: "string"}
              - {label: "Institution / Focus", name: "institution", widget: "string"}
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Email", name: "email", widget: "string"}
              - {label: "GitHub", name: "github", widget: "string"}
      - label: "Site Metadata"
        name: "settings"
        file: "src/content/data/settings.json"
        format: "json"
        fields:
          - {label: "Site Title", name: "title", widget: "string"}
          - {label: "Site Subtitle", name: "subtitle", widget: "string"}
          - {label: "Footer Text", name: "footerText", widget: "text"}
